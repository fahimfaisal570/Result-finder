name: Exam Publication Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: exam-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf
        python -m pip install --upgrade pip
        pip install pdfkit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Monitor Script
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        CIVIL_HEAD_EMAIL: ${{ secrets.CIVIL_HEAD_EMAIL }}
        EEE_HEAD_EMAIL: ${{ secrets.EEE_HEAD_EMAIL }}
        CSE_HEAD_EMAIL: ${{ secrets.CSE_HEAD_EMAIL }}
      run: python exam_monitor/monitor.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update known exams [skip ci]"
        file_pattern: 'exam_monitor/known_exams.json'
