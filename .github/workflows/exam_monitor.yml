name: Exam Publication Monitor

on:
  workflow_dispatch: # Manual trigger only

# Concurrency to prevent overlapping runs
concurrency:
  group: exam-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Monitor Script
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python exam_monitor/monitor.py

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update known exams [skip ci]"
        file_pattern: 'exam_monitor/known_exams.json'

    - name: Wait 10 minutes before re-triggering
      run: sleep 600

    - name: Re-trigger workflow via GitHub API
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
      run: |
        curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token $GITHUB_TOKEN" \
          https://api.github.com/repos/$REPO/actions/workflows/exam_monitor.yml/dispatches \
          -d '{"ref":"main"}'
        echo "Workflow re-triggered successfully at $(date)"
