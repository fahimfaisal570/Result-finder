name: Exam Publication Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: exam-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fast Detection (Check Only)
      id: check
      run: python exam_monitor/monitor.py --check-only

    - name: Install Heavy Dependencies
      if: steps.check.outputs.new_exams == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf xvfb libfontconfig
        pip install pdfkit

    - name: Run Full Monitor (PDF Generation & Mailing)
      if: steps.check.outputs.new_exams == 'true'
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        CIVIL_HEAD_EMAIL: ${{ secrets.CIVIL_HEAD_EMAIL }}
        EEE_HEAD_EMAIL: ${{ secrets.EEE_HEAD_EMAIL }}
        CSE_HEAD_EMAIL: ${{ secrets.CSE_HEAD_EMAIL }}
      run: xvfb-run python exam_monitor/monitor.py

    - name: Commit and Push changes
      if: steps.check.outputs.new_exams == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update known exams [skip ci]"
        file_pattern: 'exam_monitor/known_exams.json'
